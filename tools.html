<div class="tool-grid">
    <div class="tool-card">
        <h3>Image to PDF</h3>
        <input type="file" id="imageInput" accept="image/*">
        <button class="main-btn" onclick="convertImageToPDF()">Convert</button>
    </div>

    <div class="tool-card">
        <h3>Merge PDF</h3>
        <p>Combine multiple PDF files.</p>
        <input type="file" id="pdfInput" multiple accept=".pdf">
        <button class="main-btn" onclick="mergePDFs()">Merge Now</button>
    </div>
</div>
